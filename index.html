<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemba Walk Tool - Enterprise</title>
    
    <!-- Load pdf-lib via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root { 
            --primary: #1e40af; --success: #16a34a; --danger: #dc2626; 
            --bg: #f1f5f9; --card: #ffffff; --border: #cbd5e1; 
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); 
            padding: 20px; margin: 0; color: #1e293b; 
        }

        .container { 
            max-width: 950px; margin: 0 auto; background: var(--card); 
            padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); 
        }

        /* Compact Header */
        .form-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; border-bottom: 2px solid var(--primary); padding-bottom: 10px;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo-img { max-height: 50px; max-width: 180px; object-fit: contain; }

        .header-right { text-align: right; line-height: 1.3; }
        .confidential-tag { color: var(--danger); font-weight: 800; text-transform: uppercase; font-size: 11px; margin-bottom: 2px; }
        .meta-text { font-size: 11px; color: #64748b; font-family: monospace; }

        .input-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 15px; margin-bottom: 25px; 
        }

        .field-group { display: flex; flex-direction: column; }
        label { font-size: 10px; font-weight: 700; color: #475569; margin-bottom: 4px; text-transform: uppercase; }
        
        input, textarea { 
            padding: 10px; border: 1px solid var(--border); border-radius: 6px; 
            font-size: 16px; background: #fff;
        }
        textarea { min-height: 60px; }

        .section-box { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .section-head { 
            background: #f8fafc; padding: 12px 15px; font-weight: 800; 
            border-bottom: 1px solid var(--border); color: var(--primary);
            display: flex; justify-content: space-between; align-items: center;
        }
        .section-def { font-size: 11px; color: #64748b; font-weight: 400; font-style: italic; }

        .checklist-row { 
            display: grid; grid-template-columns: 1.8fr 130px 1.5fr; 
            gap: 15px; padding: 12px 15px; border-bottom: 1px solid #f1f5f9; align-items: start;
        }

        .status-toggle { display: flex; gap: 2px; background: #f1f5f9; padding: 3px; border-radius: 6px; }
        .toggle-btn { 
            flex: 1; padding: 9px; border: none; background: transparent; 
            cursor: pointer; font-weight: 800; font-size: 12px; border-radius: 4px;
        }
        .toggle-btn.meet.active { background: var(--success); color: white; }
        .toggle-btn.miss.active { background: var(--danger); color: white; }

        .photo-area { 
            margin: 20px 0; padding: 20px; border: 2px dashed var(--border); 
            border-radius: 10px; text-align: center; background: #f8fafc;
        }
        
        .photo-buttons {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
        }
        
        .btn-photo { 
			display: inline-flex; 
			align-items: center;
			justify-content: center;
			padding: 12px 24px; 
			background: #475569; 
			color: white; 
			border-radius: 6px; 
			font-weight: 700; 
			cursor: pointer; 
			font-size: 13px;
			border: none;
			height: 45px;
			box-sizing: border-box;
		}

		button.btn-photo {
			display: inline-flex;
			align-items: center;
			justify-content: center;
		}

		.btn-camera {
			background: var(--primary);
		}
        
        .p-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 10px; margin-top: 15px; 
        }
        .p-thumb { aspect-ratio: 1; border-radius: 6px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .p-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .p-remove { 
            position: absolute; top: 5px; right: 5px; background: var(--danger); 
            color: white; border: none; border-radius: 50%; width: 24px; height: 24px; 
            cursor: pointer; font-weight: bold; font-size: 12px;
        }

        .action-buttons {
            display: flex; gap: 10px; margin-top: 20px;
        }
        
        .btn-generate { 
            flex: 1; padding: 18px; background: var(--primary); color: white; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: 800; 
            cursor: pointer;
        }
        
        .btn-new-doc {
            padding: 18px 30px; background: #ef4444; color: white; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: 800; 
            cursor: pointer;
        }
        
        .btn-generate:disabled, .btn-new-doc:disabled {
            background: #94a3b8; cursor: not-allowed;
        }

        .loading-indicator {
            display: none; text-align: center; margin-top: 10px; color: var(--primary);
            font-weight: 600;
        }
        
        .save-indicator {
            position: fixed; top: 20px; right: 20px; padding: 8px 16px;
            background: var(--success); color: white; border-radius: 20px;
            font-size: 12px; font-weight: 600; opacity: 0;
            transition: opacity 0.3s; z-index: 1000;
        }
        
        .save-indicator.show {
            opacity: 1;
        }

        @media (max-width: 768px) { 
            .checklist-row { grid-template-columns: 1fr; }
            .p-grid { grid-template-columns: repeat(2, 1fr); }
            .action-buttons { flex-direction: column; }
            .btn-new-doc { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="save-indicator" id="saveIndicator">✓ Auto-saved</div>

<div class="container">
    <div class="form-header">
        <div class="header-left">
            <img id="mainLogo" src="" alt="Logo" style="display: none;" class="logo-img">
            <div id="logo-text-fallback" style="font-weight: 900; font-size: 20px; color: var(--primary);">GEMBA TOOL</div>
        </div>
        <div class="header-right">
            <div class="confidential-tag">Confidential</div>
            <div class="meta-text">Form: 123-1.0 | Approved: 2026-01-15</div>
        </div>
    </div>

    <div class="input-grid">
        <div class="field-group"><label>Production Area</label><input type="text" id="objName"></div>
        <div class="field-group"><label>Date</label><input type="date" id="date"></div>
        <div class="field-group" style="grid-column: 1 / -1;"><label>Participants</label><input type="text" id="parts"></div>
    </div>

    <div id="contentRoot"></div>

    <div class="photo-area">
        <div class="photo-buttons">
            <button class="btn-photo btn-camera" onclick="openCamera()">📷 OPEN CAMERA</button>
            <label for="pInp" class="btn-photo">📁 SELECT FROM GALLERY</label>
        </div>
        <input type="file" id="pInp" multiple accept="image/*" style="display: none;">
        <input type="file" id="cameraInp" accept="image/*" capture="environment" style="display: none;">
        <div class="p-grid" id="pGrid"></div>
    </div>

    <div class="input-grid">
		<div class="field-group">
			<label>Accepted by</label>
			<input type="text" id="inspector">
		</div>
		<div class="field-group">
			<label>Signature (Sign below)</label>
			<div style="position: relative;">
				<canvas id="sig-canvas" width="350" height="100" style="border: 1px solid #cbd5e1; border-radius: 6px; cursor: crosshair; touch-action: none; background: #fff;"></canvas>
				<button type="button" onclick="clearSig()" style="position: absolute; right: 5px; top: 5px; font-size: 10px; background: #f1f5f9; border: 1px solid #ccc; cursor: pointer; padding: 2px 5px; border-radius: 4px;">Clear</button>
			</div>
		</div>
	</div>

    <div class="action-buttons">
        <button class="btn-generate" id="generateBtn" onclick="generatePDF()">GENERATE OFFICIAL PDF REPORT</button>
        <button class="btn-new-doc" onclick="startNewDocument()">NEW DOCUMENT</button>
    </div>
    <div class="loading-indicator" id="loadingIndicator">Generating PDF... Please wait</div>
</div>

    function init() {
		initSignature();
        const root = document.getElementById('contentRoot');
        
        // Build checklist UI
        schema.forEach((s, si) => {
            const box = document.createElement('div');
            box.className = 'section-box';
            
            const head = document.createElement('div');
            head.className = 'section-head';
            head.innerHTML = `<span>${s.cat}</span><span class="section-def">${s.def}</span>`;
            box.appendChild(head);

            s.tasks.forEach((t, ti) => {
                const row = document.createElement('div');
                row.className = 'checklist-row';
                const uid = `s${si}t${ti}`;
                
                row.innerHTML = `
                    <div style="font-size: 15px; line-height: 1.5; font-weight: 500;">${t}</div>
                    <div class="status-toggle" id="toggle_${uid}">
                        <button class="toggle-btn meet" data-status="Meet" onclick="setStatus('${uid}', 'Meet')">✔ MEET</button>
                        <button class="toggle-btn miss" data-status="Miss" onclick="setStatus('${uid}', 'Miss')">✖ MISS</button>
                    </div>
                    <textarea id="act_${uid}" placeholder="Actions / Notes"></textarea>
                `;
                box.appendChild(row);
            });
            root.appendChild(box);
        });

        // Set default date
        document.getElementById('date').valueAsDate = new Date();
        
        // Setup file inputs
        document.getElementById('pInp').addEventListener('change', handleFileSelect);
        document.getElementById('cameraInp').addEventListener('change', handleFileSelect);
        
        // Setup autosave listeners
        setupAutosave();
        // Load logo if available
		if (LOGO_BASE64) {
			const logoImg = document.getElementById('mainLogo');
			logoImg.src = `data:image/png;base64,${LOGO_BASE64}`;
			logoImg.style.display = 'block';
			document.getElementById('logo-text-fallback').style.display = 'none';
		}
        // Load saved data if exists
        loadSavedData();
        
        // Warn before leaving with unsaved changes
        window.addEventListener('beforeunload', (e) => {
            if (hasUnsavedChanges()) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    }
	let canvas, ctx, drawing = false;

	function initSignature() {

		ctx.lineWidth = 2;

			drawing = true; 
			ctx.beginPath(); 
			const { x, y } = getPos(e);
			ctx.moveTo(x, y);
		};
		const draw = (e) => {
			if (!drawing) return;
			const { x, y } = getPos(e);
			ctx.lineTo(x, y);
			ctx.stroke();
		};
		const stopDraw = () => { drawing = false; };

		function getPos(e) {
			const rect = canvas.getBoundingClientRect();
			const clientX = e.touches ? e.touches[0].clientX : e.clientX;
			const clientY = e.touches ? e.touches[0].clientY : e.clientY;
			return { x: clientX - rect.left, y: clientY - rect.top };
		}

		canvas.addEventListener('mousedown', startDraw);
		canvas.addEventListener('mousemove', draw);
		canvas.addEventListener('mouseup', stopDraw);
		canvas.addEventListener('touchstart', startDraw);
		canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, { passive: false });
		canvas.addEventListener('touchend', stopDraw);
	}

	function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
	function isCanvasBlank(canvas) {
		const blank = document.createElement('canvas');
		blank.width = canvas.width;
		blank.height = canvas.height;
		return canvas.toDataURL() === blank.toDataURL();
	}

	// Не забудьте вызвать initSignature() в вашей функции init()
    function setupAutosave() {
        // Add listeners to all inputs
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('input', scheduleAutosave);
        });
    }

    function scheduleAutosave() {
        // Clear existing timer
        if (autosaveTimer) {
            clearTimeout(autosaveTimer);
        }
        
        // Schedule new autosave
        autosaveTimer = setTimeout(() => {
            saveData();
            showSaveIndicator();
        }, AUTOSAVE_DELAY);
    }

    function saveData() {
        const data = {
            objName: document.getElementById('objName').value,
            date: document.getElementById('date').value,
            parts: document.getElementById('parts').value,
            inspector: document.getElementById('inspector').value,
            tasks: {},
            photos: photos,
            timestamp: Date.now()
        };
        
        // Save all task statuses and actions
        schema.forEach((s, si) => {
            s.tasks.forEach((t, ti) => {
                const uid = `s${si}t${ti}`;
                const status = document.querySelector(`#toggle_${uid} .active`)?.dataset.status || null;
                const actions = document.getElementById(`act_${uid}`).value;
                data.tasks[uid] = { status, actions };
            });
        });
        
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function loadSavedData() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (!savedData) return;
        
        try {
            const data = JSON.parse(savedData);
            
            // Restore basic fields
            document.getElementById('objName').value = data.objName || '';
            document.getElementById('date').value = data.date || '';
            document.getElementById('parts').value = data.parts || '';
            document.getElementById('inspector').value = data.inspector || '';
            
            // Restore tasks
            Object.keys(data.tasks).forEach(uid => {
                const task = data.tasks[uid];
                if (task.status) {
                    setStatus(uid, task.status);
                }
                const actInput = document.getElementById(`act_${uid}`);
                if (actInput) {
                    actInput.value = task.actions || '';
                }
            });
            
            // Restore photos
            photos = data.photos || [];
            renderPhotos();
            
            console.log('Data loaded from autosave');
        } catch (e) {
            console.error('Failed to load saved data:', e);
        }
    }

    function hasUnsavedChanges() {
        // Check if any field has content
        const objName = document.getElementById('objName').value;
        const parts = document.getElementById('parts').value;
        const inspector = document.getElementById('inspector').value;
        
        if (objName || parts || inspector || photos.length > 0) {
            return true;
        }
        
        // Check if any task has status or actions
        for (let si = 0; si < schema.length; si++) {
            for (let ti = 0; ti < schema[si].tasks.length; ti++) {
                const uid = `s${si}t${ti}`;
                const status = document.querySelector(`#toggle_${uid} .active`);
                const actions = document.getElementById(`act_${uid}`).value;
                if (status || actions) {
                    return true;
                }
            }
        }
        
        return false;
    }

    function showSaveIndicator() {
        const indicator = document.getElementById('saveIndicator');
        indicator.classList.add('show');
        setTimeout(() => {
            indicator.classList.remove('show');
        }, 2000);
    }

    function startNewDocument() {
        if (hasUnsavedChanges()) {
            if (!confirm('Start a new document? Current data will be cleared.')) {
                return;
            }
        }
        
        // Clear all fields
        document.getElementById('objName').value = '';
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('parts').value = '';
        document.getElementById('inspector').value = '';
        
        // Clear all tasks
        schema.forEach((s, si) => {
            s.tasks.forEach((t, ti) => {
                const uid = `s${si}t${ti}`;
                const container = document.getElementById(`toggle_${uid}`);
                container.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`act_${uid}`).value = '';
            });
        });
        
        // Clear photos
        photos = [];
        renderPhotos();
        
        // Clear localStorage
        localStorage.removeItem(STORAGE_KEY);
        
        console.log('New document started');
    }

    function openCamera() {
        document.getElementById('cameraInp').click();
    }

    function handleFileSelect(e) {
        Array.from(e.target.files).forEach(f => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                photos.push(ev.target.result);
                renderPhotos();
                scheduleAutosave();
            };
            reader.readAsDataURL(f);
        });
        
        // Reset input to allow selecting same file again
        e.target.value = '';
    }

    function setStatus(uid, val) {
        const container = document.getElementById(`toggle_${uid}`);
        container.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        container.querySelector(`[data-status="${val}"]`).classList.add('active');
        scheduleAutosave();
    }

    function renderPhotos() {
        const grid = document.getElementById('pGrid');
        grid.innerHTML = photos.map((src, i) => `
            <div class="p-thumb">
                <img src="${src}">
                <button class="p-remove" onclick="removePhoto(${i})">×</button>
            </div>
        `).join('');
    }

    function removePhoto(idx) {
        photos.splice(idx, 1);
        renderPhotos();
        scheduleAutosave();
    }
	async function normalizeImage(base64) {
		return new Promise((resolve) => {
			const img = new Image();
			img.onload = () => {
				const canvas = document.createElement('canvas');
				canvas.width = img.width;
				canvas.height = img.height;
				const ctx = canvas.getContext('2d');
				ctx.drawImage(img, 0, 0);
				resolve(canvas.toDataURL('image/jpeg', 0.8));
			};
			img.src = base64;
		});
	}
    async function generatePDF() {
		const btn = document.getElementById('generateBtn');
		const loadingIndicator = document.getElementById('loadingIndicator');
		
		// Check if pdf-lib is loaded
		if (typeof PDFLib === 'undefined') {
			alert('PDF Library not loaded. Please check your internet connection and reload the page.');
			return;
		}

		btn.disabled = true;
		loadingIndicator.style.display = 'block';

		try {
			const { PDFDocument, rgb, StandardFonts } = PDFLib;

			const area = document.getElementById('objName').value || 'N/A';
			const reportDate = document.getElementById('date').value || 'N/A';
			const participants = document.getElementById('parts').value || 'N/A';
			const inspector = document.getElementById('inspector').value || 'N/A';

			const doc = await PDFDocument.create();
			let page = doc.addPage([595, 842]);
			let y = 800;
			let pageNum = 1;

			const fontB = await doc.embedFont(StandardFonts.HelveticaBold);
			const fontN = await doc.embedFont(StandardFonts.Helvetica);

			// Text wrapping function
			function wrapText(text, maxWidth, font, fontSize) {
				const words = text.split(' ');
				const lines = [];
				let currentLine = '';

				for (const word of words) {
					const testLine = currentLine ? `${currentLine} ${word}` : word;
					const width = font.widthOfTextAtSize(testLine, fontSize);
					
					if (width > maxWidth && currentLine) {
						lines.push(currentLine);
						currentLine = word;
					} else {
						currentLine = testLine;
					}
				}
				if (currentLine) lines.push(currentLine);
				return lines;
			}

			// Footer function
			function drawFooter(page, num) {
				page.drawText(`Page ${num}`, { 
					x: 520, y: 20, size: 8, font: fontN, color: rgb(0.5, 0.5, 0.5) 
				});
				page.drawText(`Generated: ${new Date().toLocaleString()}`, { 
					x: 50, y: 20, size: 7, font: fontN, color: rgb(0.6, 0.6, 0.6) 
				});
			}

			// Header with logo
			if (LOGO_BASE64) {
				try {
					const logoImg = await doc.embedPng(LOGO_BASE64);
					const logoDims = logoImg.scaleToFit(150, 40);
					page.drawImage(logoImg, { 
						x: 50, 
						y: y - logoDims.height, 
						width: logoDims.width, 
						height: logoDims.height 
					});
				} catch(e) { 
					console.warn("Logo embedding failed:", e);
				}
			}
			
			const headerX = 440;
			page.drawText('CONFIDENTIAL', { 
				x: headerX, y: y, size: 9, font: fontB, color: rgb(0.8, 0, 0) 
			});
			page.drawText(`Form: ${FORM_NO} | ${APPROVAL_DATE}`, { 
				x: headerX, y: y - 14, size: 7, font: fontN 
			});

			y -= 55;
			page.drawText('GEMBA WALK CHECKLIST', { x: 50, y, size: 14, font: fontB, color: rgb(0.1, 0.2, 0.5) });
			
			y -= 25;
			page.drawText(`Production Area: ${area}`, { x: 50, y, size: 10, font: fontB });
			page.drawText(`Date: ${reportDate}`, { x: 450, y, size: 10, font: fontN });
			y -= 12;
			page.drawText(`Participants: ${participants}`, { x: 50, y, size: 9, font: fontN });
			y -= 25;

			// Checklist table
			for (const s of schema) {
				const sIdx = schema.indexOf(s);
				
				if (y < 100) { 
					drawFooter(page, pageNum);
					page = doc.addPage([595, 842]); 
					y = 800; pageNum++; 
				}
				
				page.drawRectangle({ x: 50, y: y - 6, width: 500, height: 16, color: rgb(0.9, 0.9, 0.95) });
				page.drawText(s.cat.toUpperCase(), { x: 55, y, size: 9, font: fontB, color: rgb(0.1, 0.2, 0.4) });
				y -= 22;

				for (const t of s.tasks) {
					const tIdx = s.tasks.indexOf(t);
					const uid = `s${sIdx}t${tIdx}`;
					const status = document.querySelector(`#toggle_${uid} .active`)?.dataset.status || 'N/A';
					const actions = document.getElementById(`act_${uid}`).value || 'No actions';

					const wrappedT = wrapText(t, 210, fontN, 9);
					const wrappedA = wrapText(actions, 150, fontN, 9);
					const h = Math.max(wrappedT.length, wrappedA.length) * 11;
					const rowTotalHeight = h + 15;

					if (y < rowTotalHeight + 40) { 
						drawFooter(page, pageNum);
						page = doc.addPage([595, 842]); 
						y = 800; pageNum++; 
					}

					wrappedT.forEach((line, i) => page.drawText(line, { x: 55, y: y - (i*10), size: 9, font: fontN }));
					
					const icon = status === 'Meet' ? '[V]' : (status === 'Miss' ? '[X]' : '[-]');
					const color = status === 'Meet' ? rgb(0, 0.5, 0) : (status === 'Miss' ? rgb(0.8, 0, 0) : rgb(0.4, 0.4, 0.4));
					page.drawText(icon, { x: 310, y, size: 10, font: fontB, color });

					wrappedA.forEach((line, i) => page.drawText(line, { x: 360, y: y - (i*10), size: 9, font: fontN }));

					y -= (h + 8);
					page.drawLine({ start: {x: 50, y: y}, end: {x: 550, y: y}, thickness: 0.3, color: rgb(0.85, 0.85, 0.85) });
					y -= 12;
				}
				y -= 5;
			}

			// --- ФИНАЛЬНЫЙ БЛОК ПОДПИСИ (ИСПРАВЛЕННЫЙ) ---
			// Если места внизу страницы совсем мало — переносим подпись на новую
			if (y < 140) {
				page = doc.addPage([595, 842]);
				pageNum++;
				y = 800;
				drawFooter(page, pageNum);
			}

			y -= 80; // Сдвигаем вниз, чтобы блок подписи был визуально отделен

			// Текст Signature и Accepted by поднимаем выше (y + 55), чтобы картинка не налезала
			const labelsY = y + 55;
			page.drawText(`Accepted by: ${inspector}`, { x: 50, y: labelsY, size: 9, font: fontB });
			page.drawText(`Signature:`, { x: 340, y: labelsY, size: 9, font: fontN });

			// Вставляем изображение подписи (между текстом и линией)
			const sigData = canvas.toDataURL('image/png');
			if (sigData && !isCanvasBlank(canvas)) {
				try {
					const sigImage = await doc.embedPng(sigData);
					page.drawImage(sigImage, {
						x: 340,
						y: y + 10, // Картинка начинается на 10 пт выше линии
						width: 150,
						height: 40
					});
				} catch (e) { console.error("Signature embed error:", e); }
			}

			// Линия подчеркивания под подписью
			page.drawLine({ 
				start: {x: 340, y: y + 5}, 
				end: {x: 540, y: y + 5}, 
				thickness: 1,
				color: rgb(0, 0, 0)
			});
		
			// --- БЛОК ФОТОГРАФИЙ БЕЗ ПЕРЕВОРОТОВ ---
			if (photos.length > 0) {
				const photoWidth = 235;
				const photoHeight = 250;
				const photosPerRow = 2;
				const horizontalGap = 25;
				const verticalGap = 20;
				const startX = 50;
				
				let needsPhotoHeader = true;
				
				for (let i = 0; i < photos.length; i++) {
					const col = i % photosPerRow;
					const isNewRow = col === 0;
					
					if (isNewRow) {
						if (y < photoHeight + 60) {
							drawFooter(page, pageNum);
							page = doc.addPage([595, 842]);
							pageNum++;
							y = 800;
							needsPhotoHeader = true;
						}
						if (needsPhotoHeader) {
							page.drawText('ATTACHED PHOTOS', { x: 50, y: y - 10, size: 14, font: fontB });
							y -= 40;
							needsPhotoHeader = false;
						}
					}
					
					try {
						// КЛЮЧЕВОЙ МОМЕНТ: Нормализуем ориентацию перед вставкой
						const cleanBase64 = await normalizeImage(photos[i]);
						const imgData = cleanBase64.split(',')[1];
						
						// Внедряем как JPG (canvas отдаёт jpeg)
						const img = await doc.embedJpg(imgData);

						// Теперь пропорции будут честными: portrait останется portrait
						const dims = img.scaleToFit(photoWidth, photoHeight);
						const xPos = startX + col * (photoWidth + horizontalGap);
						
						page.drawImage(img, { 
							x: xPos + (photoWidth - dims.width) / 2, 
							y: y - dims.height, 
							width: dims.width, 
							height: dims.height 
						});
						
						if (col === photosPerRow - 1 || i === photos.length - 1) {
							if (col === photosPerRow - 1) y -= (photoHeight + verticalGap);
						}
					} catch(e) { 
						console.warn("Ошибка вставки фото:", e);
					}
				}
				drawFooter(page, pageNum);
			} else {
				drawFooter(page, pageNum);
			}
			

			// --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ И СОХРАНЕНИЕ ---
			function isCanvasBlank(canvas) {
				const blank = document.createElement('canvas');
				blank.width = canvas.width;
				blank.height = canvas.height;
				return canvas.toDataURL() === blank.toDataURL();
			}

			async function getImageOrientation(base64) {
				return new Promise((resolve) => {
					const img = new Image();
					img.onload = () => {
						resolve(img.width < img.height ? 'portrait' : 'landscape');
					};
					img.src = base64;
				});
			}

			
			// Save with improved Android support
			const pdfBytes = await doc.save();
			const blob = new Blob([pdfBytes], { type: 'application/pdf' });
			const url = URL.createObjectURL(blob);
			
			const link = document.createElement('a');
			link.href = url;
			link.download = `Gemba_Report_${area}_${reportDate}.pdf`;
			link.style.display = 'none';
			
			document.body.appendChild(link);
			
			// For Android use click event
			link.click();
			
			// Alternative method for some Android browsers
			setTimeout(() => {
				if (navigator.userAgent.match(/Android/i)) {
					window.location.href = url;
				}
			}, 100);
			
			// Cleanup
			setTimeout(() => {
				document.body.removeChild(link);
				URL.revokeObjectURL(url);
				btn.disabled = false;
				loadingIndicator.style.display = 'none';
				alert('PDF generated successfully!');
			}, 500);

		} catch(error) {
			console.error('PDF generation error:', error);
			alert('Error generating PDF: ' + error.message);
			btn.disabled = false;
			loadingIndicator.style.display = 'none';
		}
	}

    init();
</script>
