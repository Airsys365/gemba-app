name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Install dependencies
        run: npm ci

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Set app icons
        run: |
          ICON="icon.png"
          [ ! -f "$ICON" ] && ICON="icon-512.png"
          echo "Using icon: $ICON"
          convert "$ICON" -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert "$ICON" -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert "$ICON" -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert "$ICON" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert "$ICON" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert "$ICON" -resize 48x48   android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert "$ICON" -resize 72x72   android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert "$ICON" -resize 96x96   android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert "$ICON" -resize 144x144 android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert "$ICON" -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             android/app/build/outputs/apk/debug/GembaWalk.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GembaWalk-APK
          path: android/app/build/outputs/apk/debug/GembaWalk.apk
          retention-days: 30
